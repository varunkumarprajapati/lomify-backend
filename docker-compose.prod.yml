services:
  # The Unified Front-Door Reverse Proxy Gateway
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - auth-service
      - rtc-service
    networks:
      - lomify-network

  # Authentication Microservice
  auth-service:
    image: ghcr.io/lomify-backend/lomify-auth-service:latest
    container_name: lomify-auth-service
    restart: always
    env_file:
      - ./auth_service/.env # Kept securely on your instance server
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lomify-network

  # Real-Time RTC Microservice
  rtc-service:
    image: ghcr.io/lomify-backend/lomify-rtc-service:latest
    container_name: lomify-rtc-service
    restart: always
    env_file:
      - ./rtc_service/.env # Kept securely on your instance server
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lomify-network

  # Global Caching Layer
  redis:
    image: valkey/valkey:8-alpine
    container_name: lomify-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - lomify-network
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  lomify-network:
    driver: bridge

volumes:
  redis-data:
