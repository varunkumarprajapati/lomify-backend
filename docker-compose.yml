name: lomify

services:
  backend:
    build: 
      context: .
      target: development
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis

    develop:
      watch:
        - path: ./
          target: /app
          action: sync
          ignore:
            - node_modules/

        - path: ./package.json
          action: rebuild

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
