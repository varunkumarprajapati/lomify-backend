services:
  # The Unified Front-Door Reverse Proxy Proxy
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - auth-service
      - rtc-service
    networks:
      - lomify-network

  # Authentication Microservice
  auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
      target: development
    container_name: lomify-auth-service
    env_file:
      - ./auth_service/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lomify-network

    # Modern Native Development Watch
    develop:
      watch:
        - action: sync
          path: ./auth_service/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./auth_service/package.json

  # Real-Time RTC Microservice
  rtc-service:
    build:
      context: ./rtc_service
      dockerfile: Dockerfile
      target: development
    container_name: lomify-rtc-service
    env_file:
      - ./rtc_service/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lomify-network

    # Modern Native Development Watch
    develop:
      watch:
        - action: sync
          path: ./rtc_service/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./rtc_service/package.json

  # Global Caching & Pub/Sub Messaging Layer
  redis:
    image: valkey/valkey:8-alpine
    container_name: lomify-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - lomify-network
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

# Infrastructure resources shared by services
networks:
  lomify-network:
    driver: bridge

volumes:
  redis-data:
