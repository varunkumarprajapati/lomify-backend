events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker's internal DNS resolver (enables dynamic DNS resolution)
    resolver 127.0.0.11 valid=30s;

    proxy_http_version 1.1;

    # Upstream pointing to your decoupled Auth Service container
    upstream auth_server {
        server auth-service:8000;
        keepalive 32;
    }

    # Upstream pointing to your decoupled RTC Service container
    upstream rtc_server {
        server rtc-service:8001;
        keepalive 32;
    }

    # HTTP to HTTPS Redirect (Commented out for local development)
    server {
        listen 80;
        server_name demonvoid.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # Application Gateway Server
    server {
        listen 443 ssl;
        server_name demonvoid.duckdns.org;

        # listen 80;
        # server_name localhost;

        # # Let's Encrypt SSL Certificates
        ssl_certificate     /etc/letsencrypt/live/demonvoid.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/demonvoid.duckdns.org/privkey.pem;

        # Modern SSL protocol security optimizations
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Standard modern proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # ----------------------------------------------------------------------
        # 1. PUBLIC AUTH ZONE (Regex Match)
        # ----------------------------------------------------------------------
        # Regex locations take priority over standard prefix definitions.
        location ~ ^/api/v1/auth/(login|register|refresh|verify-otp) {
            proxy_pass http://auth_server;        
        }

        # ----------------------------------------------------------------------
        # 2. PROTECTED AUTH SERVICE ZONE
        # ----------------------------------------------------------------------
        # Handles secure identity management traffic (e.g., /api/v1/auth/logout, /api/v1/auth/me)
        location /api/v1/auth/ {
            auth_request /auth/verify;
            auth_request_set $app_user_id $upstream_http_x_user_id;
            auth_request_set $app_jti $upstream_http_x_jti;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Inject the validated identity headers captured from the subrequest
            proxy_set_header X-User-Id $app_user_id;
            proxy_set_header X-JTI $app_jti;

            proxy_pass http://auth_server;
        }

        # ----------------------------------------------------------------------
        # 3. PROTECTED USER PROFILE ZONE
        # ----------------------------------------------------------------------
        # Handles secure user-specific requests (e.g., /api/v1/users/profile, /api/v1/users/settings)
        location /api/v1/users/ {
            auth_request /auth/verify;
            auth_request_set $app_user_id $upstream_http_x_user_id;
            auth_request_set $app_jti $upstream_http_x_jti;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Inject the validated identity headers captured from the subrequest
            proxy_set_header X-User-Id $app_user_id;
            proxy_set_header X-JTI $app_jti;

            proxy_pass http://auth_server; # 👈 Managed by your auth-service container
        }

        # ----------------------------------------------------------------------
        # 4. PROTECTED REAL-TIME COMMUNICATION (RTC) REST API ZONE
        # ----------------------------------------------------------------------
        # Send protected HTTP REST endpoints meant for the RTC container here (e.g., /api/v1/rtc/rooms)
        location /api/v1/rtc/ {
            auth_request /auth/verify;
            auth_request_set $app_user_id $upstream_http_x_user_id;
            auth_request_set $app_jti $upstream_http_x_jti;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Inject the validated identity headers captured from the subrequest
            proxy_set_header X-User-Id $app_user_id;
            proxy_set_header X-JTI $app_jti;

            proxy_pass http://rtc_server;
        }

        # ----------------------------------------------------------------------
        # 5. INTERNAL AUTH VERIFICATION ENDPOINT
        # ----------------------------------------------------------------------
        location = /auth/verify {
            internal;
            proxy_pass http://auth_server/api/v1/auth/verify;
            proxy_pass_request_body off; 

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # ----------------------------------------------------------------------
        # 6. REAL-TIME COMMUNICATION (SOCKET.IO PERSISTENT ZONE)
        # ----------------------------------------------------------------------
        location /socket.io/ {
            proxy_pass http://rtc_server;

            # Force HTTP/1.1 and upgrade headers for WebSockets connection handshake
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass identity headers down to the RTC container
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Adjust timeouts to prevent Nginx from forcefully dropping quiet connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Root fallback
        location / {
            proxy_pass http://auth_server;
        }
    }
}